name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时一次（最强保活）
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 🔥 真正有效唤醒 Streamlit（不会再休眠）
        run: |
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              try {
                const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-dev-shm-usage']
                });
                
                const page = await browser.newPage({
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                });

                // 你的Streamlit地址
                await page.goto('https://insureye-deploy-vn4bc3q1gbdlkmnytswdz.streamlit.app/', {
                  timeout: 60000,
                  waitUntil: 'networkidle'
                });

                // 👇 关键：等待Streamlit应用真正加载完成
                await page.waitForSelector('[data-testid="stApp"]', { timeout: 30000 });

                // 保持连接20秒，确保WebSocket心跳生效
                await page.waitForTimeout(20000);

                console.log('✅ 成功唤醒 - 休眠计时器已重置');
                await browser.close();
              } catch (err) {
                console.error('❌ 失败:', err);
                process.exit(1);
              }
            })();
          "
