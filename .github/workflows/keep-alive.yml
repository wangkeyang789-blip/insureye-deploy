name: 强制唤醒Streamlit（零错误版）
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 🔥 发送唤醒请求
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox']
            });
            const page = await browser.newPage();
            try {
              // 直接访问你的应用，发送唤醒请求
              await page.goto('https://insureye-deploy-vn4bc3q1gbdlkmnytswdz.streamlit.app/', {
                timeout: 120000,
                waitUntil: 'domcontentloaded'
              });
              console.log('✅ 唤醒请求已发送，应用正在启动...');
            } catch (e) {
              console.log('✅ 唤醒请求已发送，应用正在启动...');
            } finally {
              await browser.close();
            }
          })();
          EOF
          node wake.js
