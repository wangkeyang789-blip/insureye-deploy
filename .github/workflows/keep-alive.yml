name: Streamlit 永久保活（空提交+唤醒二合一）
on:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时执行一次
  workflow_dispatch:

jobs:
  # 任务1：空提交 → 强制重置休眠（最稳）
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 配置Git身份
        run: |
          git config user.name "AutoKeep"
          git config user.email "keep@github.com"

      - name: 空提交续期
        run: |
          git commit --allow-empty -m "自动保活：重置Streamlit休眠"
          git push

  # 任务2：强制唤醒 → 确保应用一定启动
  wakeup:
    runs-on: ubuntu-latest
    needs: commit  # 等提交完成再唤醒
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装浏览器
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 访问唤醒应用
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox']
            });
            const page = await browser.newPage();
            try {
              await page.goto("https://insureye-deploy-vn4bc3q1gbdlkmnytswdz.streamlit.app/", {
                timeout: 120000,
                waitUntil: 'domcontentloaded'
              });
              console.log("✅ 应用已唤醒");
            } catch(e) {
              console.log("✅ 唤醒请求已发送");
            }
            await browser.close();
          })();
          EOF
          node wake.js
