name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 */4 * * *'  # 每6小时跑一次，刚好在12小时休眠阈值内
  workflow_dispatch:  # 允许手动触发测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake up Streamlit (有效唤醒)
        run: |
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              try {
                // 启动浏览器
                const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-dev-shm-usage']
                });
                const page = await browser.newPage();
                
                // 访问你的应用
                await page.goto('https://insureye-deploy-vn4bc3q1gbdlkmnytswdz.streamlit.app/?keep_alive=true');
                
                // 保持页面打开10秒，让JS和WebSocket连接完成
                await page.waitForTimeout(10000);
                
                console.log('✅ 成功访问并唤醒 Streamlit 应用');
                await browser.close();
                process.exit(0);
              } catch (error) {
                console.error('❌ 访问失败:', error);
                process.exit(1);
              }
            })();
          "
