name: 4小时空提交保活Streamlit
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  keep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 配置提交身份
        run: |
          git config user.name "AutoKeep"
          git config user.email "keep@github.com"

      - name: 空提交推送
        run: |
          git commit --allow-empty -m "4h保活续期"
          git push
